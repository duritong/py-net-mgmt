repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  - repo: local
    hooks:
      - id: generate-docs
        name: Auto-generate network documentation
        entry: bash -c "PYTHONPATH=src python -m net_mgmt.cli generate-markdown --output generated-docs && git add generated-docs/"
        language: system
        files: ^networks/
        pass_filenames: false
